<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ciberseguridad - Quimey Nuñez</title>
    <style>
        /* Estilos modernos y limpios */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .linea {
            height: 4px;
            width: 60px;
            background: #f2a154;
            margin: 10px auto 25px;
            border-radius: 2px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .box-consejos {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
            border-left: 5px solid #1e3c72;
        }

        ul {
            padding-left: 20px;
            margin: 0;
        }

        li {
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            background: #1e3c72;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #f2a154;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ciberseguridad</h1>
        <div class="linea"></div>
        
        <p>Aprende a proteger tu identidad digital y navegar de forma segura en la red.</p>

        <div class="box-consejos">
            <strong>Recomendaciones clave:</strong>
            <ul>
                <li>Utiliza autenticación de dos pasos.</li>
                <li>No hagas clic en correos sospechosos.</li>
                <li>Mantén tu sistema operativo actualizado.</li>
            </ul>
        </div>

        <a href="https://www.incibe.es" class="btn">Saber más</a>

        <div class="footer">
            Realizado por: <strong>Quimey Nuñez</strong>
        </div>
    </div>

</body>
</html>
